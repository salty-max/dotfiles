[manager]
sort_by = "natural"
sort_dir_first = true
show_hidden = true
show_symlink = true
linemode = "size"

[preview]
max_width = 1000
max_height = 1000
image_filter = "lanczos3"

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "*/javascript", use = "edit" },
]
